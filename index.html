<!DOCTYPE html>
<html lang="es" data-bs-theme="auto">
<head>
    <meta charset="UTF-8">
    <title>Contador de Días</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
<div class="app-container">
<div class="container py-5">

    <!-- Toggle tema -->
    <div class="text-end mb-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="toggleTheme()">
            🌙 / ☀️
        </button>
    </div>

    <div class="text-center mb-4">
        <h1 class="fw-bold">Contador de Días</h1>
    </div>

    <div class="card p-4">

<div class="row g-3">

    <!-- Fecha -->
    <div class="col-md-6">
        <label>Fecha inicial</label>
        <input type="date" id="fechaInicio" class="form-control">
    </div>

    <!-- Días -->
    <div class="col-md-6">
        <label>Días</label>
        <input type="number" id="dias" class="form-control">
    </div>

    <!-- Tipo -->
    <div class="col-md-12">
        <label>Tipo</label>
        <select id="tipo" class="form-select">
            <option value="corridos">Corridos</option>
            <option value="habiles">Hábiles</option>
            <option value="administrativos">Administrativos</option>
        </select>
    </div>

    <!-- 🔥 BOTÓN + RESULTADO (ARRIBA DE REGIONES) -->
    <div class="col-md-12">

        <div class="d-grid gap-2">

            <button id="btnCalcular" class="btn btn-primary btn-lg" onclick="calcular()">
                Calcular
            </button>

            <div class="result-box d-none" id="resultado"></div>

            <div class="text-center d-none" id="detalle"></div>

        </div>

    </div>

    <!-- REGIONES -->
    <div class="col-md-12">
        <label>Región</label>
        <div id="regionContainer"></div>
    </div>

</div>


        </div>

    </div>



</div>


        <!-- FOOTER -->
        <footer class="app-footer text-center small">
            <div class="fw-semibold">
                Megadrive
            </div>
            <div>
                Nuevo Contador de Días · Chile 🇨🇱
            </div>
            <div class="mt-1">
                Fotografías propias y aportes
            </div>
            <div class="mt-1 opacity-75">
                © 2026
            </div>
        </footer>


        </div>
    </div>

</body>


<script src="js/feriados.js"></script>
<script src="js/theme.js"></script>
<script src="js/app.js"></script>



</body>
</html>
